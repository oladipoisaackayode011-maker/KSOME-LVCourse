<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – KSOME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">KSOME</div>
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to access your courses and dashboard</p>

    <p id="msg" style="font-weight:700; text-align:center; margin-bottom:0.75rem;"></p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
    </div>

    <button class="btn-primary" style="width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem;" onclick="login()">Login</button>

    <div class="auth-link" style="margin-top:1rem;">
      <a href="#" style="color:rgba(255,255,255,0.4); font-size:0.82rem;">Forgot your password?</a>
    </div>

    <div class="divider">or sign in with</div>

    <div class="auth-social">
      <a href="https://www.fb.com/l/6lp1kJRRR" title="Facebook" target="_blank">f</a>
      <a href="https://www.instagram.com/invites/contact/?utm_source=ig_contact_invites&utm_medium=copy_link&utm_content=lmtj301" title="Instagram" target="_blank">ig</a>
      <a href="#" title="Google">G</a>
    </div>

    <div class="auth-link">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>

    <div class="auth-link" style="margin-top:0.5rem;">
      <a href="index.html" style="color:rgba(255,255,255,0.35); font-size:0.8rem;">← Back to Home</a>
    </div>
  </div>
</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
