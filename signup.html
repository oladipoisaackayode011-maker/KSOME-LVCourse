<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – KSOME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">KSOME</div>
    <h2>Create Your Account</h2>
    <p class="sub">Join the KSOME community and start learning today</p>

    <p id="msg" style="font-weight:700; text-align:center; margin-bottom:0.75rem;"></p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a strong password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password">
    </div>

    <button class="btn-primary" style="width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem;" onclick="signup()">Create Account</button>

    <div class="divider">or sign up with</div>

    <div class="auth-social">
      <a href="https://www.fb.com/l/6lp1kJRRR" title="Facebook" target="_blank">f</a>
      <a href="https://www.instagram.com/invites/contact/?utm_source=ig_contact_invites&utm_medium=copy_link&utm_content=lmtj301" title="Instagram" target="_blank">ig</a>
      <a href="#" title="Google">G</a>
    </div>

    <div class="auth-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>

    <div class="auth-link" style="margin-top:0.5rem;">
      <a href="index.html" style="color:rgba(255,255,255,0.35); font-size:0.8rem;">← Back to Home</a>
    </div>
  </div>
</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
